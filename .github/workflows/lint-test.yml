name: Lint & Test
on:
  pull_request:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # https://github.com/actions/setup-go/issues/525
          go-version: 1.27.0-rc.1
          # go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: latest

      - run: npm install
      - run: make lint
      - run: make test
      - run: go install filippo.io/mkcert@latest
      - run: make cert

      - run: make e2e
        env:
          COMPOSE_PARALLEL_LIMIT: 1
